<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Phân Tích Ngành Phù Hợp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/test.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Header -->
        <div class="quiz-header">
            <h1 class="quiz-title">🎯 Test Phân Tích Ngành Phù Hợp</h1>
            <p class="quiz-subtitle">Khám phá ngành nghề phù hợp với bạn</p>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section">
            <div class="progress" role="progressbar">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p class="progress-text">Câu hỏi <span id="questionNumber">1</span> / <span id="totalQuestions">25</span></p>
        </div>

        <!-- Quiz Content -->
        <div class="quiz-content">
            <!-- Question Section -->
            <div id="questionContainer" class="question-section">
                <div id="sectionBadge" class="section-badge"></div>
                <h2 id="questionText" class="question-text"></h2>
                <div id="optionsContainer" class="options-container"></div>
            </div>

            <!-- Results Section (Hidden initially) -->
            <div id="resultsSection" class="results-section d-none">
                <div class="text-center">
                    <h2 class="results-title">✨ Phân Tích Của Bạn</h2>
                    <p class="results-subtitle">Dựa trên những câu trả lời của bạn</p>
                </div>
                <div id="resultsContent" class="results-content"></div>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="button-group">
            <button id="prevBtn" class="btn btn-outline-secondary" onclick="previousQuestion()">← Quay Lại</button>
            <button id="nextBtn" class="btn btn-primary" onclick="nextQuestion()">Tiếp Tục →</button>
            <button id="submitBtn" class="btn btn-success d-none" onclick="submitQuiz()">Xem Kết Quả</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/test.js"></script>
</body>
</html>

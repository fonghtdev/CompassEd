<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CompassED</title>
    <link rel="stylesheet" href="/css/adminDashboard.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen flex items-center justify-center">
    
    <!-- Login Container -->
    <div class="w-full max-w-md px-6">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-block bg-blue-600 p-4 rounded-full mb-4">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Admin Portal</h1>
            <p class="text-slate-300">CompassED Management System</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <form id="admin-login-form">
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Email Admin
                    </label>
                    <input 
                        type="email" 
                        id="admin-email"
                        required
                        placeholder="admin@compassed.com"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    >
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Mật khẩu
                    </label>
                    <input 
                        type="password" 
                        id="admin-password"
                        required
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    >
                </div>

                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center">
                        <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-slate-600">Ghi nhớ đăng nhập</span>
                    </label>
                </div>

                <button 
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-lg hover:shadow-xl"
                >
                    Đăng nhập Admin
                </button>
            </form>

            <!-- Info -->
            <div class="mt-6 text-center">
                <p class="text-xs text-slate-500">
                    🔒 Khu vực dành riêng cho quản trị viên
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="/landing" class="text-blue-300 hover:text-blue-200 text-sm transition">
                ← Quay lại trang chủ
            </a>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 shadow-2xl">
            <div class="flex items-center space-x-3">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <span class="text-slate-700 font-medium">Đang xác thực...</span>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script src="/config.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>

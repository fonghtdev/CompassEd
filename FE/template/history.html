<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Placement History</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="../css/history.css" rel="stylesheet"/>
</head>
<body class="bg-slate-50 font-[Inter,sans-serif] min-h-screen">
  <div class="max-w-5xl mx-auto p-4 md:p-8">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <h1 class="text-2xl md:text-3xl font-black text-slate-900">Placement History</h1>
      <div class="flex gap-2">
        <button id="history-back-landing" class="px-4 py-2 rounded-lg border border-slate-200 bg-white">Landing</button>
        <button id="history-go-roadmap" class="px-4 py-2 rounded-lg bg-blue-600 text-white">Roadmap</button>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-slate-200 overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50">
          <tr>
            <th class="text-left px-4 py-3">Time</th>
            <th class="text-left px-4 py-3">Subject</th>
            <th class="text-left px-4 py-3">Level</th>
            <th class="text-left px-4 py-3">Score</th>
            <th class="text-left px-4 py-3">Attempt</th>
          </tr>
        </thead>
        <tbody id="history-table-body"></tbody>
      </table>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="../js/appLocal.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test History</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="../css/history.css" rel="stylesheet"/>
</head>
<body class="bg-slate-50 font-[Lexend,sans-serif] antialiased min-h-screen">
  <div class="relative flex h-screen w-full flex-row overflow-hidden">
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 h-full flex-shrink-0">
      <a class="flex items-center gap-3 px-6 py-6 border-b border-slate-100" href="/landing" style="text-decoration:none;color:inherit;">
        <div class="bg-[#eef6ff] flex items-center justify-center rounded-lg h-10 w-10 text-[#0d7ff2]">
          <span class="material-symbols-outlined">explore</span>
        </div>
        <div class="flex flex-col">
          <h1 class="text-slate-900 text-lg font-bold leading-none tracking-tight">CompassED</h1>
          <p id="history-portal-label" class="text-slate-600 text-xs font-medium mt-1">Student Portal</p>
        </div>
      </a>
      <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
        <a id="history-nav-dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 text-slate-600 hover:text-slate-900 transition-colors" href="#">
          <span class="material-symbols-outlined text-xl">dashboard</span>
          <span id="history-nav-dashboard-label" class="text-sm font-medium">Dashboard</span>
        </a>
        <a id="history-nav-roadmap" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 text-slate-600 hover:text-slate-900 transition-colors" href="#">
          <span class="material-symbols-outlined text-xl">map</span>
          <span id="history-nav-roadmap-label" class="text-sm font-medium">Roadmap</span>
        </a>
        <a id="history-nav-overview" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-[#eef6ff] text-[#0d7ff2] font-semibold transition-colors" href="#">
          <span class="material-symbols-outlined text-xl">history</span>
          <span id="history-nav-overview-label" class="text-sm font-semibold">History</span>
        </a>
        <div class="pt-4 mt-4 border-t border-slate-100">
          <p id="history-setting-label" class="px-3 text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Setting</p>
          <a id="history-nav-profile" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-50 text-slate-600 hover:text-slate-900 transition-colors" href="#">
            <span class="material-symbols-outlined text-xl">person</span>
            <span id="history-nav-profile-label" class="text-sm font-medium">Profile</span>
          </a>
          <a id="history-nav-logout" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-red-50 text-red-600 transition-colors" href="#">
            <span class="material-symbols-outlined text-xl">logout</span>
            <span id="history-nav-logout-label" class="text-sm font-medium">Logout</span>
          </a>
        </div>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50">
      <header class="flex items-center justify-between h-16 px-6 bg-white border-b border-slate-200 flex-shrink-0">
        <div class="flex items-center gap-4">
          <button id="history-menu-btn" class="md:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-50">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <h2 id="history-page-title" class="text-lg font-bold text-slate-900">Test History</h2>
        </div>
        <div class="relative">
          <button id="history-notif-btn" class="relative p-2.5 rounded-lg text-[#475569] hover:bg-slate-100 transition-colors">
            <span class="material-symbols-outlined">notifications</span>
            <span id="history-notif-badge" class="absolute -top-1 -right-1 min-w-[20px] h-5 px-1.5 rounded-full bg-[#0d7ff2] text-white text-[11px] font-bold flex items-center justify-center hidden">0</span>
          </button>
          <div id="history-notif-panel" class="hidden absolute right-0 top-12 w-[360px] max-w-[92vw] bg-[#1f242b] text-slate-100 rounded-2xl border border-slate-700 shadow-2xl overflow-hidden z-40">
            <div class="px-4 py-3 border-b border-slate-700">
              <h3 id="history-notif-title" class="text-2xl font-bold">Thông báo</h3>
            </div>
            <div id="history-notif-list" class="max-h-[420px] overflow-y-auto p-3 space-y-2">
              <div id="history-notif-loading" class="text-sm text-slate-300">Đang tải thông báo...</div>
            </div>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-6 md:p-8">
        <div class="max-w-6xl mx-auto">
          <div class="bg-white rounded-xl border border-slate-200 overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-50">
                <tr>
                  <th class="text-left px-4 py-3">Test Name</th>
                  <th class="text-left px-4 py-3">Subject</th>
                  <th class="text-left px-4 py-3">Level</th>
                  <th class="text-left px-4 py-3">Time</th>
                  <th class="text-left px-4 py-3">Score</th>
                </tr>
              </thead>
              <tbody id="history-table-body"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../config.js"></script>
  <script type="module" src="../js/main.js"></script>
</body>
</html>

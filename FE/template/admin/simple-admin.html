<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Question Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-900">Question Bank Management</h1>
                <button id="logout-btn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                    Đăng xuất
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Add Question Button -->
            <div class="mb-6">
                <button id="add-question-btn" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                    + Thêm câu hỏi mới
                </button>
            </div>

            <!-- Questions List -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-6 border-b">
                    <h2 class="text-xl font-semibold">Danh sách câu hỏi</h2>
                </div>
                <div id="questions-container" class="divide-y">
                    <div class="p-6 text-center text-gray-500">Đang tải...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Add/Edit Question -->
    <div id="question-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b">
                <h3 id="modal-title" class="text-xl font-semibold">Thêm câu hỏi mới</h3>
            </div>
            <form id="question-form" class="p-6 space-y-4">
                <input type="hidden" id="question-id">
                
                <div>
                    <label class="block text-sm font-medium mb-2">Môn học</label>
                    <select id="subject-id" required class="w-full border rounded px-3 py-2">
                        <option value="">Chọn môn học...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Câu hỏi</label>
                    <textarea id="question-text" required rows="3" class="w-full border rounded px-3 py-2"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Đáp án A</label>
                    <input type="text" id="option-0" required class="w-full border rounded px-3 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Đáp án B</label>
                    <input type="text" id="option-1" required class="w-full border rounded px-3 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Đáp án C</label>
                    <input type="text" id="option-2" required class="w-full border rounded px-3 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Đáp án D</label>
                    <input type="text" id="option-3" required class="w-full border rounded px-3 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Đáp án đúng</label>
                    <input type="text" id="correct-answer" required class="w-full border rounded px-3 py-2" placeholder="Nhập đáp án đúng">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Độ khó (1-3)</label>
                    <input type="number" id="difficulty" min="1" max="3" value="1" required class="w-full border rounded px-3 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Level</label>
                    <select id="level" required class="w-full border rounded px-3 py-2">
                        <option value="L1">L1</option>
                        <option value="L2">L2</option>
                        <option value="L3">L3</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Skill Type</label>
                    <input type="text" id="skill-type" required class="w-full border rounded px-3 py-2" placeholder="VD: Nhan chia, Grammar">
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                        Lưu
                    </button>
                    <button type="button" id="cancel-btn" class="flex-1 px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">
                        Hủy
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../config.js"></script>
    <script type="module" src="../../js/simple-admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CompassED Auth</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="../css/auth.css" rel="stylesheet"/>
</head>
<body class="bg-slate-50 font-[Inter,sans-serif] min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-4xl grid md:grid-cols-2 bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="p-8 md:p-10 bg-blue-600 text-white">
      <h1 class="text-3xl font-black">CompassED</h1>
      <p id="auth-intro" class="mt-3 text-blue-100">Đăng nhập để đồng bộ placement, roadmap và lịch sử học tập.</p>
      <ul class="mt-6 space-y-2 text-sm text-blue-100 list-disc pl-4">
        <li id="auth-bullet-1">Placement test với kết quả từ BE local</li>
        <li id="auth-bullet-2">Mở khóa roadmap từ checkout local</li>
        <li id="auth-bullet-3">Lịch sử các lần làm bài</li>
      </ul>
    </div>
    <div class="p-8 md:p-10">
      <div class="flex gap-2 mb-4">
        <button id="tab-login" class="px-4 py-2 rounded-lg bg-blue-600 text-white font-semibold">Login</button>
        <button id="tab-register" class="px-4 py-2 rounded-lg bg-slate-100 text-slate-700 font-semibold">Register</button>
      </div>

      <form id="login-form" class="space-y-3">
        <input id="login-email" type="email" required placeholder="Email" class="w-full rounded-lg border-slate-200"/>
        <input id="login-password" type="password" required placeholder="Password" class="w-full rounded-lg border-slate-200"/>
        <button class="w-full rounded-lg bg-blue-600 text-white py-2.5 font-bold" type="submit">Login</button>
      </form>

      <form id="register-form" class="space-y-3 hidden">
        <input id="register-name" type="text" required placeholder="Full name" class="w-full rounded-lg border-slate-200"/>
        <input id="register-email" type="email" required placeholder="Email" class="w-full rounded-lg border-slate-200"/>
        <input id="register-password" type="password" minlength="6" required placeholder="Password (>=6)" class="w-full rounded-lg border-slate-200"/>
        <button class="w-full rounded-lg bg-blue-600 text-white py-2.5 font-bold" type="submit">Register</button>
      </form>

      <div class="my-5 flex items-center gap-3 text-xs text-slate-400">
        <div class="h-px bg-slate-200 flex-1"></div>
        <span id="auth-or-continue">OR CONTINUE WITH</span>
        <div class="h-px bg-slate-200 flex-1"></div>
      </div>

      <div class="space-y-3">
        <div id="google-signin-container" class="flex justify-center"></div>
        <button id="github-mock-btn" class="w-full rounded-lg border border-slate-200 py-2.5 font-semibold text-slate-700 hover:bg-slate-50" type="button">
          Continue with GitHub (Dev)
        </button>
      </div>

      <p class="mt-4 text-xs text-slate-500"><span id="auth-google-note-label">Google login cần thiết lập</span> <code>GOOGLE_CLIENT_ID</code>.</p>
    </div>
  </div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../config.js"></script>
  <script type="module" src="../js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap - CompassED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .module-locked { opacity: 0.5; cursor: not-allowed; }
        .module-completed { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .module-in-progress { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .module-not-started { background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-2xl font-bold text-indigo-600">CompassED</a>
                <span class="text-gray-300">|</span>
                <span class="text-gray-700 font-semibold" id="roadmap-title">Roadmap</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/history" class="text-gray-700 hover:text-indigo-600">Lịch sử</a>
                <span id="user-name" class="text-gray-600"></span>
                <button id="logout-btn" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">
                    Đăng xuất
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl shadow-xl p-8 text-white mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold mb-2" id="subject-name">Mathematics</h1>
                    <p class="text-indigo-100 mb-4" id="level-info">Level 1 - Nền tảng</p>
                    <div class="flex items-center space-x-4">
                        <div class="bg-white/20 rounded-lg px-4 py-2">
                            <span class="text-sm">Hoàn thành</span>
                            <span class="font-bold ml-2" id="progress-text">0/3</span>
                        </div>
                        <div class="bg-white/20 rounded-lg px-4 py-2">
                            <span class="text-sm">Điểm trung bình</span>
                            <span class="font-bold ml-2" id="avg-score">--</span>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="w-32 h-32 relative">
                        <svg class="transform -rotate-90 w-32 h-32">
                            <circle cx="64" cy="64" r="56" stroke="rgba(255,255,255,0.2)" stroke-width="8" fill="none"/>
                            <circle id="progress-circle" cx="64" cy="64" r="56" stroke="white" stroke-width="8" fill="none"
                                    stroke-dasharray="352" stroke-dashoffset="352" stroke-linecap="round"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-3xl font-bold" id="progress-percent">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Modules List -->
        <div id="modules-container" class="space-y-6">
            <!-- Modules will be loaded here -->
        </div>
        
        <!-- Final Test Section -->
        <div id="final-test-section" class="hidden mt-8 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-2xl shadow-xl p-8 text-white">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold mb-2">🏆 Final Test</h2>
                    <p class="text-yellow-100 mb-4">Hoàn thành tất cả modules để mở khóa final test</p>
                    <p class="text-sm text-yellow-100">Đạt ≥75% để được thăng cấp lên level tiếp theo</p>
                </div>
                <button id="take-final-test-btn" class="px-8 py-4 bg-white text-orange-600 rounded-xl font-bold text-lg hover:bg-yellow-50 shadow-lg">
                    Làm Final Test
                </button>
            </div>
        </div>
        
        <!-- Loading -->
        <div id="loading" class="text-center py-12">
            <div class="animate-spin w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-gray-600">Đang tải roadmap...</p>
        </div>
        
        <!-- Error -->
        <div id="error" class="hidden bg-red-50 border border-red-200 rounded-xl p-8 text-center">
            <p class="text-red-600 text-lg font-semibold mb-4">❌ Không thể tải roadmap</p>
            <p class="text-red-500 mb-4" id="error-message"></p>
            <button onclick="location.reload()" class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700">
                Thử lại
            </button>
        </div>
        
    </div>

    <!-- Module Detail Modal -->
    <div id="module-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b px-8 py-6 flex items-center justify-between">
                <h2 class="text-2xl font-bold text-gray-900" id="modal-module-name">Module 1</h2>
                <button id="close-modal-btn" class="text-gray-500 hover:text-gray-700 text-3xl">&times;</button>
            </div>
            
            <div class="p-8">
                <!-- Module Content -->
                <div id="modal-content" class="prose max-w-none mb-8">
                    <!-- Content will be loaded here -->
                </div>
                
                <!-- Actions -->
                <div class="flex items-center space-x-4">
                    <button id="start-module-btn" class="hidden px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700">
                        Bắt đầu học
                    </button>
                    <button id="take-mini-test-btn" class="hidden px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700">
                        Làm Mini Test
                    </button>
                    <button id="view-mini-test-result-btn" class="hidden px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">
                        Xem kết quả
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/appLocal.js"></script>
    <script>
        (function() {
            const API_BASE = "http://localhost:8080";
            let userId = null;
            let subjectId = null;
            let level = null;
            let roadmap = null;
            let modules = [];
            let userProgress = [];
            
            document.addEventListener('DOMContentLoaded', async () => {
                // Check auth
                const token = localStorage.getItem('compassed_token');
                const user = JSON.parse(localStorage.getItem('compassed_user') || 'null');
                
                if (!token || !user) {
                    window.location.href = '/auth';
                    return;
                }
                
                userId = user.id;
                document.getElementById('user-name').textContent = user.fullName || user.email;
                
                // Get params from URL
                const params = new URLSearchParams(window.location.search);
                subjectId = params.get('subjectId') || 1;
                level = params.get('level') || 'L1';
                
                // Load roadmap
                await loadRoadmap();
                
                // Event listeners
                document.getElementById('logout-btn').addEventListener('click', () => {
                    localStorage.clear();
                    window.location.href = '/auth';
                });
                
                document.getElementById('close-modal-btn').addEventListener('click', closeModal);
            });
            
            async function loadRoadmap() {
                const token = localStorage.getItem('compassed_token');
                
                try {
                    const res = await fetch(`${API_BASE}/api/roadmaps/${subjectId}/${level}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (!res.ok) throw new Error('Failed to load roadmap');
                    
                    const data = await res.json();
                    roadmap = data.roadmap;
                    modules = data.modules || [];
                    
                    // Load user progress
                    await loadUserProgress();
                    
                    // Render
                    renderRoadmap();
                    
                    document.getElementById('loading').classList.add('hidden');
                    
                } catch (err) {
                    console.error('Error loading roadmap:', err);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error').classList.remove('hidden');
                    document.getElementById('error-message').textContent = err.message;
                }
            }
            
            async function loadUserProgress() {
                const token = localStorage.getItem('compassed_token');
                
                try {
                    const res = await fetch(`${API_BASE}/api/modules/progress?userId=${userId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (res.ok) {
                        userProgress = await res.json();
                    }
                } catch (err) {
                    console.error('Error loading progress:', err);
                }
            }
            
            function renderRoadmap() {
                // Update header
                document.getElementById('roadmap-title').textContent = roadmap.title || 'Roadmap';
                document.getElementById('level-info').textContent = roadmap.description || '';
                
                // Calculate progress
                const completedCount = userProgress.filter(p => p.status === 'COMPLETED').length;
                const totalCount = modules.length;
                const progressPercent = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
                
                document.getElementById('progress-text').textContent = `${completedCount}/${totalCount}`;
                document.getElementById('progress-percent').textContent = `${progressPercent}%`;
                
                // Update progress circle
                const circumference = 352;
                const offset = circumference - (progressPercent / 100) * circumference;
                document.getElementById('progress-circle').style.strokeDashoffset = offset;
                
                // Calculate average score
                const scores = userProgress.filter(p => p.miniTestScore != null).map(p => p.miniTestScore);
                const avgScore = scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : '--';
                document.getElementById('avg-score').textContent = avgScore !== '--' ? `${avgScore}%` : '--';
                
                // Render modules
                const container = document.getElementById('modules-container');
                container.innerHTML = modules.map((module, index) => {
                    const progress = userProgress.find(p => p.moduleId === module.id);
                    const status = progress ? progress.status : 'NOT_STARTED';
                    const score = progress ? progress.miniTestScore : null;
                    const isLocked = index > 0 && !userProgress.some(p => p.moduleId === modules[index-1].id && p.status === 'COMPLETED');
                    
                    let statusClass = 'module-not-started';
                    let statusText = 'Chưa học';
                    let icon = '📚';
                    
                    if (status === 'COMPLETED') {
                        statusClass = 'module-completed';
                        statusText = 'Hoàn thành';
                        icon = '✓';
                    } else if (status === 'IN_PROGRESS') {
                        statusClass = 'module-in-progress';
                        statusText = 'Đang học';
                        icon = '📖';
                    }
                    
                    return `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-all ${isLocked ? 'module-locked' : 'cursor-pointer'}"
                             onclick="${isLocked ? '' : `openModule(${module.id})`}">
                            <div class="flex items-center p-6">
                                <div class="flex-shrink-0 w-16 h-16 ${statusClass} rounded-xl flex items-center justify-center text-white text-2xl font-bold mr-6">
                                    ${icon}
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center justify-between mb-2">
                                        <h3 class="text-xl font-bold text-gray-900">${module.moduleName}</h3>
                                        ${isLocked ? '<span class="text-yellow-600 text-sm font-semibold">🔒 Locked</span>' : ''}
                                    </div>
                                    <div class="flex items-center space-x-4 text-sm text-gray-600">
                                        <span class="flex items-center">
                                            <span class="mr-1">⏱️</span>
                                            ${module.durationMinutes || 60} phút
                                        </span>
                                        <span class="flex items-center">
                                            <span class="mr-1">📊</span>
                                            ${statusText}
                                        </span>
                                        ${score ? `<span class="flex items-center text-green-600 font-semibold"><span class="mr-1">🎯</span> ${score}%</span>` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                // Show final test if all modules completed
                if (completedCount === totalCount && totalCount > 0) {
                    document.getElementById('final-test-section').classList.remove('hidden');
                }
            }
            
            window.openModule = function(moduleId) {
                const module = modules.find(m => m.id === moduleId);
                if (!module) return;
                
                const progress = userProgress.find(p => p.moduleId === moduleId);
                
                document.getElementById('modal-module-name').textContent = module.moduleName;
                document.getElementById('modal-content').innerHTML = marked.parse(module.content || 'Nội dung đang được cập nhật...');
                
                // Show appropriate buttons
                document.getElementById('start-module-btn').classList.add('hidden');
                document.getElementById('take-mini-test-btn').classList.add('hidden');
                document.getElementById('view-mini-test-result-btn').classList.add('hidden');
                
                if (!progress || progress.status === 'NOT_STARTED') {
                    document.getElementById('start-module-btn').classList.remove('hidden');
                    document.getElementById('start-module-btn').onclick = () => startModule(moduleId);
                } else if (progress.status === 'IN_PROGRESS') {
                    document.getElementById('take-mini-test-btn').classList.remove('hidden');
                    document.getElementById('take-mini-test-btn').onclick = () => takeMiniTest(moduleId);
                } else if (progress.status === 'COMPLETED') {
                    document.getElementById('view-mini-test-result-btn').classList.remove('hidden');
                    document.getElementById('view-mini-test-result-btn').onclick = () => alert('Bạn đã hoàn thành module này với điểm: ' + progress.miniTestScore + '%');
                }
                
                document.getElementById('module-modal').classList.remove('hidden');
            };
            
            function closeModal() {
                document.getElementById('module-modal').classList.add('hidden');
            }
            
            async function startModule(moduleId) {
                const token = localStorage.getItem('compassed_token');
                
                try {
                    const res = await fetch(`${API_BASE}/api/modules/${moduleId}/start`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ userId })
                    });
                    
                    if (res.ok) {
                        alert('Đã bắt đầu học module!');
                        closeModal();
                        await loadUserProgress();
                        renderRoadmap();
                    }
                } catch (err) {
                    console.error('Error starting module:', err);
                    alert('Có lỗi xảy ra. Vui lòng thử lại.');
                }
            }
            
            function takeMiniTest(moduleId) {
                window.location.href = `/mini-test?moduleId=${moduleId}`;
            }
            
            // Load marked.js for markdown parsing
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
            document.head.appendChild(script);
            
        })();
    </script>
    
</body>
</html>

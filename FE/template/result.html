<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompassED - Kết Quả Khảo Sát</title>
    <meta name="description" content="Kết quả khảo sát nghề nghiệp của bạn">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/survey.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/result.css">
</head>
<body>
    <!-- Header Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
                <i class="fas fa-compass fs-4 text-danger"></i>
                <span class="fw-bold">CompassED</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">
                            <i class="fas fa-home me-1"></i> Trang chủ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="survey.html">
                            <i class="fas fa-clipboard-list me-1"></i> Khảo sát
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="courses.html">
                            <i class="fas fa-book me-1"></i> Khóa học
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Results Container -->
    <div class="survey-wrapper">
        <div class="container py-5">
            <!-- Loading State -->
            <div id="loadingState" class="text-center py-5">
                <div class="spinner-border text-danger mb-3" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Đang tải...</span>
                </div>
                <h4>Đang phân tích kết quả của bạn...</h4>
                <p class="text-muted">Vui lòng đợi trong giây lát</p>
            </div>

            <!-- Results Content -->
            <div id="resultsContainer" class="d-none">
                <div id="resultsContent"></div>
            </div>

            <!-- No Results State -->
            <div id="noResultsState" class="text-center py-5 d-none">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle fa-4x text-warning"></i>
                </div>
                <h3 class="mb-3">Không tìm thấy kết quả khảo sát</h3>
                <p class="text-muted mb-4">Bạn chưa hoàn thành khảo sát hoặc dữ liệu đã hết hạn</p>
                <a href="survey.html" class="btn btn-danger btn-lg">
                    <i class="fas fa-clipboard-list me-2"></i>Làm khảo sát ngay
                </a>
            </div>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Results Script -->
    <script>
        // Career Groups Data
        const careerGroups = {
            A: {
                name: 'Nhóm A: Kinh Tế - Kinh Doanh',
                traits: ['analytical', 'leadership', 'practical'],
                description: 'Bạn có khả năng phân tích, lãnh đạo và định hướng kinh doanh tốt. Phù hợp với các ngành quản lý, tài chính, marketing.',
                careers: ['Quản Trị Kinh Doanh', 'Tài Chính - Ngân Hàng', 'Marketing', 'Kế Toán', 'Kinh Tế Học'],
                universities: ['ĐH Kinh Tế Quốc Dân', 'ĐH Ngoại Thương', 'ĐH Kinh Tế TP.HCM'],
                color: '#22c55e',
                icon: 'fa-chart-line',
                strengths: ['Tư duy phân tích chiến lược', 'Kỹ năng lãnh đạo và quản lý', 'Định hướng mục tiêu rõ ràng'],
                suggestions: ['Tham gia câu lạc bộ khởi nghiệp', 'Học các khóa Marketing & Business', 'Thực tập tại các công ty kinh doanh']
            },
            B: {
                name: 'Nhóm B: Kỹ Thuật - Công Nghệ',
                traits: ['analytical', 'technical', 'practical'],
                description: 'Bạn có tư duy logic, giỏi công nghệ và kỹ thuật. Phù hợp với các ngành lập trình, kỹ sư, khoa học máy tính.',
                careers: ['Công Nghệ Thông Tin', 'Khoa Học Máy Tính', 'Kỹ Thuật Điện - Điện Tử', 'Cơ Khí', 'Xây Dựng'],
                universities: ['ĐH Bách Khoa Hà Nội', 'ĐH Bách Khoa TP.HCM', 'ĐH Công Nghệ - ĐHQGHN'],
                color: '#3b82f6',
                icon: 'fa-laptop-code',
                strengths: ['Tư duy logic và kỹ thuật', 'Ham học hỏi công nghệ mới', 'Giải quyết vấn đề sáng tạo'],
                suggestions: ['Tham gia CLB STEM / Robotics', 'Tự học lập trình (FreeCodeCamp, W3Schools)', 'Tìm hiểu về AI, Machine Learning']
            },
            C: {
                name: 'Nhóm C: Ngôn Ngữ - Truyền Thông',
                traits: ['communicative', 'creative', 'collaborative'],
                description: 'Bạn có khả năng giao tiếp tốt, sáng tạo trong ngôn từ. Phù hợp với các ngành báo chí, ngoại ngữ, quan hệ công chúng.',
                careers: ['Báo Chí - Truyền Thông', 'Ngôn Ngữ Anh', 'Quan Hệ Công Chúng', 'Biên - Phiên Dịch', 'Ngôn Ngữ Học'],
                universities: ['ĐH Khoa Học Xã Hội và Nhân Văn', 'ĐH Ngoại Ngữ - ĐHQGHN', 'Học Viện Báo Chí'],
                color: '#eab308',
                icon: 'fa-comments',
                strengths: ['Giao tiếp và diễn đạt xuất sắc', 'Sáng tạo nội dung hấp dẫn', 'Kỹ năng làm việc nhóm tốt'],
                suggestions: ['Viết blog hoặc chia sẻ nội dung sáng tạo', 'Tham gia CLB diễn thuyết', 'Luyện kỹ năng ngoại ngữ']
            },
            D: {
                name: 'Nhóm D: Nghệ Thuật - Thiết Kế',
                traits: ['creative', 'reflective', 'introverted'],
                description: 'Bạn có tư duy sáng tạo, nhạy cảm nghệ thuật. Phù hợp với các ngành thiết kế, nghệ thuật, kiến trúc.',
                careers: ['Thiết Kế Đồ Họa', 'Kiến Trúc', 'Mỹ Thuật', 'Thiết Kế Thời Trang', 'Nhiếp Ảnh - Quay Phim'],
                universities: ['ĐH Kiến Trúc Hà Nội', 'ĐH Mỹ Thuật Công Nghiệp', 'ĐH Sân Khấu - Điện Ảnh'],
                color: '#f97316',
                icon: 'fa-palette',
                strengths: ['Tư duy sáng tạo độc đáo', 'Cảm nhận thẩm mỹ tinh tế', 'Khả năng biểu đạt nghệ thuật'],
                suggestions: ['Thực hành vẽ và thiết kế hàng ngày', 'Học các công cụ Adobe (Photoshop, Illustrator)', 'Tham gia triển lãm nghệ thuật']
            },
            E: {
                name: 'Nhóm E: Giáo Dục - Tâm Lý',
                traits: ['collaborative', 'communicative', 'reflective'],
                description: 'Bạn có khả năng thấu hiểu con người, hỗ trợ và giáo dục. Phù hợp với các ngành giáo dục, tâm lý, xã hội học.',
                careers: ['Sư Phạm', 'Tâm Lý Học', 'Công Tác Xã Hội', 'Giáo Dục Mầm Non', 'Tư Vấn Học Đường'],
                universities: ['ĐH Sư Phạm Hà Nội', 'ĐH Sư Phạm TP.HCM', 'ĐH Giáo Dục - ĐHQGHN'],
                color: '#a855f7',
                icon: 'fa-user-graduate',
                strengths: ['Thấu hiểu và đồng cảm cao', 'Kỹ năng hỗ trợ và giảng dạy', 'Kiên nhẫn và tận tâm'],
                suggestions: ['Tham gia hoạt động tình nguyện', 'Học về tâm lý học và kỹ năng mềm', 'Thử làm gia sư hoặc dạy kèm']
            },
            F: {
                name: 'Nhóm F: Nông - Lâm - Ngư - Y',
                traits: ['practical', 'analytical', 'reflective'],
                description: 'Bạn quan tâm đến môi trường, sức khỏe và thực hành. Phù hợp với các ngành y dược, nông nghiệp, môi trường.',
                careers: ['Y Khoa', 'Dược Học', 'Nông Nghiệp', 'Môi Trường', 'Thú Y'],
                universities: ['ĐH Y Hà Nội', 'ĐH Y Dược TP.HCM', 'ĐH Nông Lâm TP.HCM'],
                color: '#ef4444',
                icon: 'fa-seedling',
                strengths: ['Quan tâm đến sức khỏe cộng đồng', 'Tư duy khoa học thực nghiệm', 'Tinh thần trách nhiệm cao'],
                suggestions: ['Tham gia các hoạt động bảo vệ môi trường', 'Tìm hiểu về y học và khoa học sức khỏe', 'Tham quan các cơ sở y tế, nông trại']
            }
        };

        let resultChart = null;

        // Load and display results
        function loadResults() {
            const surveyData = localStorage.getItem('surveyResults');
            
            if (!surveyData) {
                // No results found
                document.getElementById('loadingState').classList.add('d-none');
                document.getElementById('noResultsState').classList.remove('d-none');
                return;
            }

            try {
                const data = JSON.parse(surveyData);
                displayResults(data);
                
                // Hide loading, show results
                setTimeout(() => {
                    document.getElementById('loadingState').classList.add('d-none');
                    document.getElementById('resultsContainer').classList.remove('d-none');
                }, 1000);
            } catch (error) {
                console.error('Error loading results:', error);
                document.getElementById('loadingState').classList.add('d-none');
                document.getElementById('noResultsState').classList.remove('d-none');
            }
        }

        // Display results
        function displayResults(data) {
            const { groupScores, sortedGroups, total } = data;
            const resultsContent = document.getElementById('resultsContent');
            const topGroup = sortedGroups[0];

            // Create hero section
            const hero = document.createElement('div');
            hero.className = 'result-hero';
            hero.style.background = `linear-gradient(135deg, ${careerGroups[topGroup].color}15, ${careerGroups[topGroup].color}05)`;
            hero.innerHTML = `
                <div class="hero-icon-wrapper" style="background: linear-gradient(135deg, ${careerGroups[topGroup].color}, ${careerGroups[topGroup].color}cc); box-shadow: 0 10px 30px ${careerGroups[topGroup].color}40;">
                    <i class="fas ${careerGroups[topGroup].icon}"></i>
                </div>
                <h2 class="hero-title">Kết Quả Khảo Sát Nghề Nghiệp</h2>
                <p class="hero-subtitle">Nghề nghiệp phù hợp nhất với bạn là</p>
                <h3 class="hero-group-name" style="color: ${careerGroups[topGroup].color};">${careerGroups[topGroup].name}</h3>
                <div class="hero-score-badge" style="background: ${careerGroups[topGroup].color}; box-shadow: 0 4px 15px ${careerGroups[topGroup].color}50;">
                    ${Math.round((groupScores[topGroup] / total) * 100)}% phù hợp
                </div>
            `;
            resultsContent.appendChild(hero);

            // Create chart section
            const chartSection = document.createElement('div');
            chartSection.className = 'chart-section';
            chartSection.innerHTML = `
                <h3>
                    <i class="fas fa-chart-bar me-2" style="color: #ff3d00;"></i>
                    Biểu Đồ Phân Tích Các Nhóm Nghề
                </h3>
                <div class="chart-container">
                    <canvas id="resultsChart"></canvas>
                </div>
            `;
            resultsContent.appendChild(chartSection);

            // Create detailed results title
            const detailsTitle = document.createElement('h3');
            detailsTitle.className = 'details-title';
            detailsTitle.innerHTML = `
                <i class="fas fa-star me-2" style="color: #ff3d00;"></i>
                Chi Tiết Các Nhóm Nghề Phù Hợp
            `;
            resultsContent.appendChild(detailsTitle);

            // Create cards for all groups
            sortedGroups.forEach((groupKey, index) => {
                const group = careerGroups[groupKey];
                const score = groupScores[groupKey];
                const percentage = Math.round((score / total) * 100);
                
                const card = document.createElement('div');
                card.className = 'group-card';
                card.style.borderLeftColor = group.color;
                card.style.animationDelay = `${index * 0.1}s`;
                
                const topBadge = index < 3 ? `<div class="top-badge" style="background: ${group.color}; box-shadow: 0 4px 12px ${group.color}50;">Top ${index + 1}</div>` : '';
                
                card.innerHTML = `
                    ${topBadge}
                    <div class="card-header-section">
                        <div class="icon-box" style="background: ${group.color}20;">
                            <i class="fas ${group.icon}" style="color: ${group.color};"></i>
                        </div>
                        <div class="card-title-section">
                            <h4>${group.name}</h4>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" style="width: ${percentage}%; background: linear-gradient(90deg, ${group.color}, ${group.color}dd);"></div>
                                <span class="progress-bar-text">${percentage}% phù hợp</span>
                            </div>
                        </div>
                    </div>
                    
                    <p class="card-description">${group.description}</p>
                    
                    <div class="detail-block">
                        <h5 style="color: ${group.color};">
                            <i class="fas fa-bullseye"></i> Thế Mạnh
                        </h5>
                        <ul class="detail-list">
                            ${group.strengths.map(strength => `
                                <li>
                                    <i class="fas fa-check-circle" style="color: ${group.color};"></i>
                                    <span>${strength}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    
                    <div class="detail-block">
                        <h5 style="color: ${group.color};">
                            <i class="fas fa-briefcase"></i> Ngành Nghề Phù Hợp
                        </h5>
                        <div class="career-tags">
                            ${group.careers.map(career => `
                                <span class="career-tag" style="background: ${group.color}20; color: ${group.color}; border: 1px solid ${group.color}40;">${career}</span>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="detail-block">
                        <h5 style="color: ${group.color};">
                            <i class="fas fa-university"></i> Trường Đào Tạo
                        </h5>
                        <ul class="detail-list">
                            ${group.universities.map(uni => `
                                <li>
                                    <i class="fas fa-graduation-cap" style="color: ${group.color};"></i>
                                    <span>${uni}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    
                    <div class="detail-block">
                        <h5 style="color: ${group.color};">
                            <i class="fas fa-compass"></i> Bạn Nên Thử
                        </h5>
                        <ul class="detail-list">
                            ${group.suggestions.map(suggestion => `
                                <li>
                                    <i class="fas fa-arrow-right" style="color: ${group.color};"></i>
                                    <span>${suggestion}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;

                resultsContent.appendChild(card);
            });

            // Action buttons
            const actions = document.createElement('div');
            actions.className = 'actions-section';
            actions.innerHTML = `
                <p class="actions-info">
                    <i class="fas fa-lightbulb"></i>
                    Bạn có thể lưu lại kết quả này hoặc thực hiện khảo sát lại để có thêm thông tin
                </p>
                <div class="action-buttons">
                    <button onclick="downloadResults()" class="btn-action btn btn-outline-primary">
                        <i class="fas fa-download"></i> Tải Kết Quả (PDF)
                    </button>
                    <button onclick="window.print()" class="btn-action btn btn-outline-danger">
                        <i class="fas fa-print"></i> In Kết Quả
                    </button>
                    <a href="survey.html" class="btn-action btn btn-danger" style="background: linear-gradient(135deg, #ff3d00 0%, #ff5722 100%); border-color: #ff3d00;">
                        <i class="fas fa-redo"></i> Làm Lại Khảo Sát
                    </a>
                    <a href="courses.html" class="btn-action btn btn-success" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); border-color: #28a745;">
                        <i class="fas fa-book"></i> Xem Khóa Học
                    </a>
                </div>
            `;
            resultsContent.appendChild(actions);

            // Create chart
            setTimeout(() => createResultsChart(groupScores, sortedGroups, total), 500);
        }

        // Create Chart
        function createResultsChart(groupScores, sortedGroups, total) {
            const ctx = document.getElementById('resultsChart');
            if (!ctx) return;
            
            if (resultChart) {
                resultChart.destroy();
            }
            
            const labels = sortedGroups.map(key => careerGroups[key].name);
            const data = sortedGroups.map(key => Math.round((groupScores[key] / total) * 100));
            const colors = sortedGroups.map(key => careerGroups[key].color);
            
            resultChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Độ Phù Hợp (%)',
                        data: data,
                        backgroundColor: colors.map(c => c + '40'),
                        borderColor: colors,
                        borderWidth: 3,
                        borderRadius: 10,
                        barThickness: 60
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            titleFont: {
                                size: 14,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 13
                            },
                            callbacks: {
                                label: function(context) {
                                    return `Độ phù hợp: ${context.parsed.y}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                },
                                font: {
                                    size: 12,
                                    weight: '600'
                                }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            ticks: {
                                font: {
                                    size: 11,
                                    weight: '600'
                                },
                                callback: function(value, index) {
                                    const label = this.getLabelForValue(value);
                                    return label.length > 25 ? label.substr(0, 25) + '...' : label;
                                }
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // Download results
        function downloadResults() {
            alert('Tính năng tải PDF đang được phát triển. Hiện tại bạn có thể sử dụng chức năng In (Ctrl+P / Cmd+P) để lưu kết quả dưới dạng PDF!');
        }

        // Back to top
        const backToTopBtn = document.getElementById('backToTop');
        
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                backToTopBtn.classList.add('show');
            } else {
                backToTopBtn.classList.remove('show');
            }
        });
        
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // Load results on page load
        window.addEventListener('DOMContentLoaded', loadResults);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CompassED Checkout</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-50 font-[Inter,sans-serif] min-h-screen">
  <div class="max-w-3xl mx-auto p-4 md:p-8">
    <div class="bg-white rounded-xl border border-slate-200 p-6 md:p-8">
      <h1 id="checkout-title" class="text-2xl md:text-3xl font-black text-slate-900">Checkout</h1>
      <p id="checkout-subtitle" class="text-slate-600 mt-2">Chọn môn muốn mở roadmap.</p>

      <div id="checkout-subject-list" class="mt-6 space-y-3"></div>

      <div class="mt-6 rounded-lg bg-slate-50 border border-slate-200 p-4 flex items-center justify-between">
        <span id="checkout-total-label" class="text-slate-600">Tổng thanh toán</span>
        <span id="checkout-total" class="text-xl font-black text-slate-900">0 VND</span>
      </div>

      <div class="mt-6 flex gap-3">
        <button id="checkout-back" class="px-4 py-2.5 rounded-lg border border-slate-200 bg-white">Quay lại</button>
        <button id="checkout-pay" class="px-5 py-2.5 rounded-lg bg-blue-600 text-white font-bold">Thanh toán và mở roadmap</button>
      </div>
    </div>
  </div>
  <script src="../config.js"></script>
  <script type="module" src="../js/main.js"></script>
</body>
</html>

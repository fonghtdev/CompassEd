<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CompassED - AI Placement Test</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="../css/placementTest.css" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d7ff2",
                        "primary-dark": "#0b6bcb",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101922",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2632",
                        "border-light": "#e2e8f0",
                        "border-dark": "#2d3748",
                        "text-primary-light": "#0f172a",
                        "text-primary-dark": "#f8fafc",
                        "text-secondary-light": "#64748b",
                        "text-secondary-dark": "#94a3b8",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-primary-light dark:text-text-primary-dark antialiased overflow-hidden h-screen flex flex-col">
<div class="flex flex-1 overflow-hidden">
<!-- Sidebar Navigation -->
<aside class="w-64 bg-surface-light dark:bg-surface-dark border-r border-border-light dark:border-border-dark flex flex-col shrink-0 hidden lg:flex h-full overflow-hidden">
    <!-- Timer -->
    <div class="p-5 border-b border-border-light dark:border-border-dark">
        <div class="flex items-center gap-2 mb-3">
            <span class="material-symbols-outlined text-primary text-lg">timer</span>
            <span class="text-xs font-semibold text-text-secondary-light dark:text-text-secondary-dark uppercase tracking-wider">Time Remaining</span>
        </div>
        <div class="flex gap-2">
            <div class="flex-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-2 text-center">
                <span id="placement-timer-hrs" class="block text-2xl font-bold font-mono">00</span>
                <span class="text-[10px] uppercase text-text-secondary-light dark:text-text-secondary-dark font-medium">Hrs</span>
            </div>
            <div class="flex-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-2 text-center">
                <span id="placement-timer-min" class="block text-2xl font-bold font-mono text-primary">45</span>
                <span class="text-[10px] uppercase text-text-secondary-light dark:text-text-secondary-dark font-medium">Min</span>
            </div>
            <div class="flex-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-2 text-center">
                <span id="placement-timer-sec" class="block text-2xl font-bold font-mono">00</span>
                <span class="text-[10px] uppercase text-text-secondary-light dark:text-text-secondary-dark font-medium">Sec</span>
            </div>
        </div>
    </div>
    <!-- Question list -->
    <div class="p-4 border-b border-border-light dark:border-border-dark flex items-center justify-between">
        <span class="text-sm font-semibold text-text-primary-light dark:text-text-primary-dark">Questions</span>
        <span id="placement-progress-text" class="text-xs font-medium text-text-secondary-light dark:text-text-secondary-dark">0 / 0</span>
    </div>
    <div id="placement-question-grid" class="flex-1 overflow-y-auto p-4">
        <!-- Question number buttons rendered by JS -->
    </div>
    <!-- Progress bar -->
    <div class="p-4 border-t border-border-light dark:border-border-dark">
        <div class="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
            <div id="placement-progress-bar" class="h-full bg-primary w-[0%] rounded-full transition-all duration-300"></div>
        </div>
    </div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col h-full overflow-hidden relative">
<!-- Mobile Header for Timer (Visible only on small screens) -->
<div class="lg:hidden bg-surface-light dark:bg-surface-dark border-b border-border-light dark:border-border-dark p-4 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">timer</span>
<span class="font-mono font-bold text-lg">45:30</span>
</div>
<div id="placement-counter-mobile" class="text-sm text-text-secondary-light dark:text-text-secondary-dark">Question 1 of 1</div>
</div>
<div class="flex-1 overflow-y-auto p-6 md:p-10 lg:p-16 flex justify-center">
<div class="max-w-3xl w-full flex flex-col">
<!-- Progress bar (answered questions) -->
<div class="mb-6">
    <div class="mb-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-2 text-sm text-text-secondary-light dark:text-text-secondary-dark">
            <span class="material-symbols-outlined text-primary text-base">school</span>
            <span>Khối lớp</span>
        </div>
        <select id="placement-grade-select" class="rounded-lg border border-border-light dark:border-border-dark bg-white dark:bg-slate-800 px-3 py-1 text-sm">
            <option value="10">Lớp 10</option>
            <option value="11">Lớp 11</option>
            <option value="12">Lớp 12</option>
        </select>
    </div>
    <div class="flex items-center justify-between text-sm text-text-secondary-light dark:text-text-secondary-dark">
        <span>Tiến độ</span>
        <span id="placement-progress-text-main">0 / 0</span>
    </div>
    <div class="mt-2 h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
        <div id="placement-progress-bar-main" class="h-full bg-primary w-[0%] rounded-full transition-all duration-300"></div>
    </div>
</div>
<!-- Question Header -->
<div class="mb-8">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold uppercase tracking-wider mb-4">
<span class="material-symbols-outlined text-sm">calculate</span>
                            Algebra I
                        </div>
<h2 id="placement-question-text" class="text-3xl md:text-4xl font-bold leading-tight text-text-primary-light dark:text-text-primary-dark mb-4">
                            Solve for x: <span class="font-mono bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded text-primary">2x + 5 = 15</span>
</h2>
<p id="placement-question-desc" class="text-text-secondary-light dark:text-text-secondary-dark text-lg leading-relaxed">
                            Select the value of x that makes the equation true. Remember to isolate the variable x by performing inverse operations.
                        </p>
</div>
<!-- Preview controls (FE-only) - hidden, loaded by JS -->
<div id="placement-preview-controls" class="hidden">
    <button id="placement-load-preview-btn"></button>
    <select id="placement-preview-subject">
        <option value="1">Math (Toan)</option>
        <option value="2">Literature (Van)</option>
        <option value="3">English (Anh)</option>
    </select>
    <span id="placement-preview-note"></span>
</div>
<!-- Answer Options -->
<div id="placement-options" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
</div>
</div>
</div>
<!-- Bottom Action Bar -->
<div class="bg-surface-light dark:bg-surface-dark border-t border-border-light dark:border-border-dark p-4 md:px-10 md:py-6 flex items-center justify-between shrink-0">
<button id="placement-prev-btn" class="flex items-center gap-2 px-6 py-2.5 rounded-lg text-text-secondary-light dark:text-text-secondary-dark hover:bg-slate-100 dark:hover:bg-slate-800 font-medium transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
                    Câu trước
                </button>
<div class="flex gap-3">
<button id="placement-flag-btn" class="flex items-center gap-2 px-6 py-2.5 rounded-lg border border-border-light dark:border-border-dark text-text-secondary-light dark:text-text-secondary-dark hover:bg-slate-100 dark:hover:bg-slate-800 font-medium transition-colors">
<span class="material-symbols-outlined text-[20px]">flag</span>
<span class="hidden sm:inline">Flag for Review</span>
</button>
<button id="placement-submit-btn" class="flex items-center gap-2 px-8 py-2.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-bold shadow-lg shadow-emerald-600/25 transition-all transform active:scale-95">
<span class="material-symbols-outlined">check_circle</span>
                        Nộp bài
</button>
<button id="placement-next-btn" class="flex items-center gap-2 px-8 py-2.5 rounded-lg bg-primary hover:bg-primary-dark text-white font-bold shadow-lg shadow-primary/25 transition-all transform active:scale-95">
                        Câu tiếp theo
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</main>
</div>
<script src="../config.js"></script>
<script type="module" src="../js/main.js"></script>
</body></html>

services:
  mysql:
    image: mysql:8.0
    container_name: compassed-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: compassed
    ports:
      - "3307:3306"
    volumes:
      - compassed_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  compassed_mysql_data:

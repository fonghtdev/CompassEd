server:
  port: 8080

spring:
  profiles:
    active: mysql
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

openai:
  api:
    key: ${OPENAI_API_KEY:}
  model: gpt-5

auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@compassed.local}}
  jwt:
    secret: ${JWT_SECRET:change-me-compassed-jwt-secret-32chars-min}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

checkout:
  qr:
    image-url: ${CHECKOUT_QR_IMAGE_URL:https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=CompassED_Payment_Placeholder}
    account-name: ${CHECKOUT_QR_ACCOUNT_NAME:COMPASSED}
    account-no: ${CHECKOUT_QR_ACCOUNT_NO:0000000000}
    bank: ${CHECKOUT_QR_BANK:VietQR}
    bank-bin: ${CHECKOUT_QR_BANK_BIN:970422}

casso:
  enabled: ${CASSO_ENABLED:false}
  api-key: ${CASSO_API_KEY:}
  base-url: ${CASSO_BASE_URL:https://oauth.casso.vn/v2}
  account-number: ${CASSO_ACCOUNT_NUMBER:}
  page-size: ${CASSO_PAGE_SIZE:50}
  check-cooldown-seconds: ${CASSO_CHECK_COOLDOWN_SECONDS:20}

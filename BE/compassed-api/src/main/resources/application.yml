server:
  port: 8080

spring:
  profiles:
    active: mysql
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

openai:
  api:
    key: ${OPENAI_API_KEY:}
  model: gpt-5

auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:compassed.edu@gmail.com}}
  jwt:
    secret: ${JWT_SECRET:change-me-compassed-jwt-secret-32chars-min}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

checkout:
  qr:
    image-url: ${CHECKOUT_QR_IMAGE_URL:https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=CompassED_Payment_Placeholder}
    account-name: ${CHECKOUT_QR_ACCOUNT_NAME:COMPASSED}
    account-no: ${CHECKOUT_QR_ACCOUNT_NO:0000000000}
    bank: ${CHECKOUT_QR_BANK:VietQR}
    bank-bin: ${CHECKOUT_QR_BANK_BIN:970422}

payos:
  enabled: ${PAYOS_ENABLED:true}
  client-id: ${PAYOS_CLIENT_ID:}
  api-key: ${PAYOS_API_KEY:}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}
  base-url: ${PAYOS_BASE_URL:https://api-merchant.payos.vn}
  return-url: ${PAYOS_RETURN_URL:https://compassed.io.vn/checkout}
  cancel-url: ${PAYOS_CANCEL_URL:https://compassed.io.vn/checkout}
  check-cooldown-seconds: ${PAYOS_CHECK_COOLDOWN_SECONDS:15}

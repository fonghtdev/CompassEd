server:
  port: 8080

spring:
  profiles:
    active: mysql

openai:
  api:
    key: ${OPENAI_API_KEY:}
  model: gpt-5

auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  jwt:
    secret: ${JWT_SECRET:change-me-compassed-jwt-secret-32chars-min}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

server:
  port: 8080

spring:
  profiles:
    active: mysql
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

openai:
  api:
    key: ${OPENAI_API_KEY:}
  model: gpt-5

auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@compassed.local}}
  jwt:
    secret: ${JWT_SECRET:change-me-compassed-jwt-secret-32chars-min}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
